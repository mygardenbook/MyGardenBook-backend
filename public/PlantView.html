<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Plant Details</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&family=Kalam:wght@700&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    font-family: 'Baloo 2','Kalam',sans-serif;
    background: url('Bg.png') no-repeat center center fixed;
    background-size: cover;
    position: relative;
    min-height: 100vh;
  }

  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(255,255,255,0.7);
    z-index: 1;
  }

  .container {
    position: relative;
    z-index: 5;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ---------- BACK BUTTON ---------- */
  .back-arrow {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 10;
    background: none;
    border: none;
    cursor: pointer;
    width: 36px;
    height: 36px;
  }

  /* ---------- FLIP CARD ---------- */
  .flip-card {
    width: 70%;
    max-width: 320px;
    aspect-ratio: 4 / 3;
    perspective: 1200px;
    margin-top: 5rem;
    cursor: pointer;
    z-index: 3;
  }

  .flip-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transition: transform 0.8s ease;
    transform-style: preserve-3d;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  }

  .flip-card.flipped .flip-inner {
    transform: rotateY(180deg);
  }

  .flip-front, .flip-back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 20px;
    backface-visibility: hidden;
    overflow: hidden;
    display:flex;
    justify-content:center;
    align-items:center;
  }

  .flip-front img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 20px;
  }

  .flip-back {
    transform: rotateY(180deg);
    background: rgba(143,216,113,0.4);
    flex-direction: column;
    color: #1f2715;
    box-shadow: inset 0 0 25px rgba(102,160,58,0.3);
  }

  .qr-flip {
    width: 120px; height: 120px;
    object-fit: contain;
    border-radius: 12px;
    margin-bottom: 0.4rem;
  }

  /* ---------- DETAILS ---------- */
  .details {
    width: 85%;
    max-width: 420px;
    color: #262A23;
    font-size: 1.1rem;
    margin-top: 1.5rem;
    z-index: 5;
  }

  .green-box {
    background: rgba(143,216,113,0.35);
    border-radius: 20px;
    padding: 0.9rem 1rem;
    margin-top: 0.3rem;
    font-size: 1rem;
    line-height: 1.4rem;
  }

  /* ---------- AI SECTION ---------- */
  .ai-section {
    width: 85%;
    max-width: 420px;
    background: rgba(143, 216, 113, 0.3);
    border-radius: 20px;
    box-shadow: 0 2px 10px rgba(183,218,184,0.6);
    padding: 1rem;
    margin: 2rem 0 2rem 0;
    z-index: 5;
  }

  .ai-section textarea {
    width:100%;
    border-radius:12px;
    border:none;
    resize:none;
    font-size:1rem;
    padding:0.6rem;
    background:#fff;
    outline:none;
  }

  .ai-section button {
    background: rgba(143,216,113,0.5);
    border: 3px solid #66A03A;
    border-radius: 30px;
    padding:0.4rem 1.4rem;
    font-size:1rem;
    cursor:pointer;
    margin-top:0.7rem;
  }

  @media (max-width:600px){
    .flip-card { width: 85%; margin-top: 4rem; }
    .details { width: 90%; }
  }
</style>
</head>

<body>

<button class="back-arrow" onclick="window.history.back()">
  <svg viewBox="0 0 30 30" width="100%" height="100%">
    <polyline points="20,6 10,15 20,24"
              fill="none"
              stroke="#262A23"
              stroke-width="4"
              stroke-linecap="round"
              stroke-linejoin="round"/>
  </svg>
</button>

<div class="container">

  <!-- FLIP CARD -->
  <div class="flip-card" id="flipCard">
    <div class="flip-inner">
      <div class="flip-front">
        <img id="plantImage" src="placeholder.jpg">
      </div>

      <div class="flip-back">
        <img id="plantQR" class="qr-flip" src="qr_placeholder.png">
        <p>Scan Me!</p>
      </div>
    </div>
  </div>

  <!-- DETAILS -->
  <div class="details">
    <p><strong>Scientific Name:</strong> <span id="scientificName">Loading...</span></p>
    <p><strong>Common Name:</strong> <span id="commonName">Loading...</span></p>
    <p><strong>Category:</strong> <span id="category">Loading...</span></p>

    <p style="font-weight:bold; margin-top:1rem;">Description:</p>
    <div class="green-box" id="description">Loading...</div>
  </div>

  <!-- AI -->
  <div class="ai-section">
    <label>Ask AI</label>
    <textarea id="aiQuestion" placeholder="Ask something..."></textarea>
    <button onclick="handleUniversalAI()">Chat with AI</button>

    <div id="aiResponse" style="display:flex;flex-direction:column;background:#f5f5f5;padding:1rem;border-radius:10px;max-height:200px;overflow-y:auto;"></div>
  </div>

</div>

<script>
  const API_BASE = window.location.origin;
  const plantId = window.location.pathname.split("/").pop();

  const imgEl = document.getElementById("plantImage");
  const qrEl = document.getElementById("plantQR");

  async function loadPlant() {
    const res = await fetch(`${API_BASE}/api/plants/${plantId}`);
    const plant = await res.json();

    imgEl.src = plant.image ? API_BASE + plant.image : "placeholder.jpg";
    qrEl.src = plant.qrCode ? API_BASE + plant.qrCode : "qr_placeholder.png";
    scientificName.textContent = plant.scientificName || "N/A";
    commonName.textContent = plant.name || "N/A";
    category.textContent = plant.category || "N/A";
    description.textContent = plant.description || "N/A";
  }

  // Flip–Card click behavior
  document.getElementById("flipCard").addEventListener("click", () => {
    document.getElementById("flipCard").classList.toggle("flipped");
  });

  loadPlant();
</script>

<script src="/js/chat.js"></script>

</body>
</html>
