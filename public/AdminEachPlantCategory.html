<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin - Plant Category</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&family=Kalam:wght@700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Baloo 2', 'Kalam', 'Arial', sans-serif;
    background: url('Bg.png') no-repeat center center fixed;
    background-size: cover;
    position: relative;
    overflow-x: hidden;
  }

  .overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(255,255,255,0.7);
    z-index: 1;
  }

  .back-arrow {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 5;
    background: none;
    border: none;
    cursor: pointer;
    width: 36px;
    height: 36px;
  }

  h1 {
    background: rgba(143,216,113,0.6);
    color: #262A23;
    font-size: 2rem;
    text-align: center;
    padding: 0.8rem 2rem;
    border-radius: 20px;
    width: fit-content;
    margin: 4.5rem auto 2rem auto;
    font-weight: 600;
    position: relative;
    z-index: 2;
  }

  .plant-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.5rem;
    justify-items: center;
    width: 100%;
    max-width: 420px;
    margin: 0 auto 3rem;
    position: relative;
    z-index: 2;
  }

  .plant-card {
    background: rgba(143,216,113,0.5);
    border-radius: 20px;
    box-shadow: 0 4px 18px #B7DAB8cc;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0.8rem;
    transition: transform 0.2s ease, box-shadow 0.2s;
    width: 130px;
    cursor: pointer;
  }

  .plant-card:hover {
    transform: scale(1.03);
    box-shadow: 0 6px 20px #B7DAB8;
  }

  .plant-img {
    width: 70px;
    height: 70px;
    object-fit: cover;
    border-radius: 10px;
    background: #fff;
  }

  .plant-name {
    background: #204d1e;
    color: #fff;
    font-size: 0.85rem;
    border-radius: 16px;
    padding: 0.3rem 0.8rem;
    margin-top: 0.6rem;
    text-align: center;
  }

  .no-results {
    text-align: center;
    font-size: 1rem;
    color: #2b4022;
    font-weight: 500;
    margin-top: 1.5rem;
  }

  @media (max-width: 600px) {
    .plant-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 1.2rem;
      max-width: 90%;
    }
    h1 { font-size: 1.6rem; margin-top: 4rem; }
    .plant-card { width: 110px; }
  }
</style>
</head>

<body>
  <div class="overlay"></div>

  <button class="back-arrow" onclick="window.location.href='AdminPlantCategories.html'" aria-label="Go back">
    <svg viewBox="0 0 30 30" width="100%" height="100%">
      <polyline points="20,6 10,15 20,24"
                fill="none" stroke="#262A23"
                stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <h1 id="categoryTitle">Category</h1>

  <div class="plant-grid" id="plantGrid"></div>
  <div class="no-results" id="noResults" style="display:none;">No plants found in this category.</div>

  <script>
    const API_BASE = "http://localhost:5000";
    const params = new URLSearchParams(window.location.search);
    const category = params.get("category");
    const titleEl = document.getElementById("categoryTitle");
    const grid = document.getElementById("plantGrid");
    const noResults = document.getElementById("noResults");

    titleEl.textContent = category || "Category";

    async function loadPlants() {
      try {
        const res = await fetch(`${API_BASE}/api/plants?category=${encodeURIComponent(category)}`);
        if (!res.ok) throw new Error("Failed to load plants");
        const plants = await res.json();
        grid.innerHTML = "";
        if (plants.length === 0) {
          noResults.style.display = "block";
          return;
        }
        noResults.style.display = "none";

        plants.forEach(p => {
          const card = document.createElement("div");
          card.className = "plant-card";
          card.onclick = () => openEditPage(p.id);
          card.innerHTML = `
            <img src="${p.image || 'placeholder.jpg'}" class="plant-img" alt="${p.name}">
            <div class="plant-name">${p.name}</div>
          `;
          grid.appendChild(card);
        });
      } catch (err) {
        console.error(err);
        noResults.style.display = "block";
        noResults.textContent = "Error loading plants.";
      }
    }

    function openEditPage(id) {
     window.location.href = 'AdminAddPlant.html?id=' + encodeURIComponent(id);
    }

    loadPlants();
  </script>
</body>
</html>
