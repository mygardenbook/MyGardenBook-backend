<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Fish Categories</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* 🎨 Your original CSS is fully preserved — no visual changes */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('Bg.png') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    .bg-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(255,255,255,0.64); z-index: 0; pointer-events: none; }
    .container { position: relative; z-index: 1; max-width: 520px; margin: 25px auto 40px auto; padding: 0 4vw 40px 4vw; }
    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 9px; position: relative; }
    .back-arrow { background: none; border: none; font-size: 1.6em; color: #193c10; cursor: pointer; margin-left: -2px; margin-right: 0; width: 25px; height: 25px; display: flex; align-items: center; justify-content: center; padding: 0; }
    .action-btn-group { display: flex; gap: 16px; }
    .action-btn { background: #A6DEAA; border: none; border-radius: 30px; padding: 15px 28px; font-size: 1.12em; font-weight: 400; color: #193c10; cursor: pointer; transition: background 0.14s, color 0.13s; box-shadow: 0 2px 12px 0 rgba(109,164,109,0.10); }
    .action-btn:active, .action-btn.selected { background: #7bb37b; color: #fff; }
    .categories-header { background: #A6DEAA; border-radius: 34px; text-align: center; font-size: 2.2em; font-weight: 500; color: #222e12; margin: 38px auto 25px auto; padding: 18px 0 17px 0; letter-spacing: 1px; width: 98%; }
    .categories-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 22px 16px; justify-items: center; padding-bottom: 15px; }
    .category-card { background: #A6DEAA; border-radius: 26px; width: 117px; height: 156px; padding: 15px 6px 10px 6px; display: flex; flex-direction: column; align-items: center; cursor: pointer; box-shadow: 0 2px 10px rgba(109,164,109,0.09); position: relative; border: 3px solid transparent; transition: box-shadow 0.1s, border-color 0.13s, background 0.11s; margin: 0; }
    .category-card:hover, .category-card:focus { background: #8BC48A; box-shadow: 0 8px 18px rgba(32,71,36,0.12); }
    .category-card.delete-select { border: 3px solid #e46b66; background: #e9bdbb; }
    .category-img { width: 84px; height: 62px; background: #d3f6d1; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; overflow: hidden; }
    .category-img-icon { font-size: 2em; color: #aadd9e; margin-top: 6px; margin-left: 2px; user-select: none; }
    .category-label { background: #244a22; color: #fff; border-radius: 13px; font-size: 1em; width: 94%; padding: 10px 2px; margin-top: 17px; text-align: center; font-weight: 400; user-select: none; letter-spacing: 0.5px; }
    .delete-btn-bar { margin: 19px auto -6px auto; text-align: center; color: #e46b66; font-weight: 600; font-size: 1.04em; display: none; }
    .delete-mode .delete-btn-bar { display: block; }
    @media (max-width:700px) { .container { max-width: 99vw; padding: 0 2vw; } .categories-header { font-size: 1.45em; padding: 10px 0; } .categories-grid { gap: 13px 2vw; } .category-card { width: 41vw; max-width:118px; height: 120px; min-width: 90px; } .category-img { width: 67px; height: 53px; } .category-label { font-size: .97em; border-radius: 8px; padding: 6px 2px; } }
    #statusMsg { text-align:center; font-size:0.95em; color:#2e7d32; min-height:1.3em; margin-top:10px; }
  </style>
</head>
<body>
  <div class="bg-overlay"></div>
  <div class="container">
    <div class="top-bar">
      <button class="back-arrow" onclick="window.location.href='AdminFishes.html'" aria-label="Go Back">
        <svg height="25" width="25" viewBox="0 0 30 30" aria-hidden="true">
          <polyline points="20,6 10,15 20,24" fill="none" stroke="#193c10" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="action-btn-group">
        <button class="action-btn" id="addBtn">Add</button>
        <button class="action-btn" id="deleteBtn">Delete</button>
      </div>
    </div>
    <div class="categories-header">Fish Categories</div>
    <div class="delete-btn-bar" id="deleteInfo">Tap categories to select. When ready, click Delete again.</div>
    <div id="statusMsg"></div>
    <div class="categories-grid" id="categoriesGrid"></div>
  </div>

  <script>
    const API_BASE = "http://localhost:5000";
    let categories = [];
    let deleteMode = false;
    let deleteSelected = [];

    const statusMsg = document.getElementById("statusMsg");
    const grid = document.getElementById("categoriesGrid");

    function goBack() { window.history.back(); }

    function showMessage(msg, type = "info") {
      statusMsg.textContent = msg;
      statusMsg.style.color =
        type === "error" ? "#b22222" : type === "success" ? "#2e7d32" : "#2a3d25";
      setTimeout(() => (statusMsg.textContent = ""), 2500);
    }

    async function loadCategories() {
      try {
        const res = await fetch(`${API_BASE}/categories`);
        if (!res.ok) throw new Error("Unable to load categories");
        categories = await res.json();
        renderCategories();
      } catch (err) {
        console.error(err);
        showMessage("Failed to load categories", "error");
      }
    }

    async function addCategory() {
      const input = document.createElement("input");
      input.type = "text";
      input.placeholder = "Enter new fish category name";
      input.style.position = "fixed";
      input.style.top = "20px";
      input.style.left = "50%";
      input.style.transform = "translateX(-50%)";
      input.style.zIndex = "1000";
      input.style.borderRadius = "8px";
      input.style.border = "2px solid #244a22";
      input.style.padding = "8px 10px";
      input.style.fontSize = "1rem";
      input.style.background = "#fff";
      document.body.appendChild(input);
      input.focus();

      input.addEventListener("keydown", async (e) => {
        if (e.key === "Enter") {
          const name = input.value.trim();
          input.remove();
          if (!name) return showMessage("Category name required", "error");
          try {
            const res = await fetch(`${API_BASE}/categories`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ name }),
            });
            const data = await res.json();
            if (res.ok) {
              showMessage("Category added", "success");
              await loadCategories();
            } else {
              showMessage(data.message || "Error adding category", "error");
            }
          } catch (err) {
            console.error(err);
            showMessage("Failed to add category", "error");
          }
        }
        if (e.key === "Escape") input.remove();
      });
    }

    async function deleteCategory(id) {
      try {
        const res = await fetch(`${API_BASE}/categories/${id}`, { method: "DELETE" });
        const data = await res.json();
        if (res.ok) {
          showMessage("Category deleted", "success");
          await loadCategories();
        } else {
          showMessage(data.message || "Error deleting category", "error");
        }
      } catch (err) {
        console.error(err);
        showMessage("Failed to delete category", "error");
      }
    }

    function toggleDeleteMode() {
      if (deleteMode && deleteSelected.length > 0) {
        deleteSelected.forEach((id) => deleteCategory(id));
        deleteSelected = [];
      }
      deleteMode = !deleteMode;
      document.body.classList.toggle("delete-mode", deleteMode);
      document.getElementById("deleteBtn").classList.toggle("selected", deleteMode);
      document.getElementById("deleteInfo").style.display = deleteMode ? "block" : "none";
      renderCategories();
    }

    function toggleCategoryDeleteSelect(id) {
      if (deleteSelected.includes(id)) {
        deleteSelected = deleteSelected.filter((x) => x !== id);
      } else {
        deleteSelected.push(id);
      }
      renderCategories();
    }

    function openCategory(name) {
      if (deleteMode) {
        const cat = categories.find((c) => c.name === name);
        if (cat) toggleCategoryDeleteSelect(cat.id);
      } else {
        window.location.href =
          "AdminEachFishCategory.html?category=" + encodeURIComponent(name);
      }
    }

    function renderCategories() {
      grid.innerHTML = categories
        .map(
          (cat) => `
          <div class="category-card${
            deleteMode && deleteSelected.includes(cat.id) ? " delete-select" : ""
          }" tabindex="0" onclick="openCategory('${cat.name}')">
            <div class="category-img">
              ${
                cat.img
                  ? `<img src="${cat.img}" alt="${cat.name}" style="width:98%;height:98%;object-fit:cover;border-radius:12px;">`
                  : `<span class="category-img-icon">&#128031;</span>`
              }
            </div>
            <div class="category-label">${cat.name}</div>
          </div>`
        )
        .join("");
    }

    document.getElementById("addBtn").addEventListener("click", addCategory);
    document.getElementById("deleteBtn").addEventListener("click", toggleDeleteMode);

    loadCategories();
  </script>
</body>
</html>
