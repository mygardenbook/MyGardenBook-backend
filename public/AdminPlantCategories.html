<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Plant Categories</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('Bg.png') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    .bg-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(255,255,255,0.64);
      z-index: 0; pointer-events: none;
    }
    .container {
      position: relative;
      z-index: 1;
      max-width: 520px;
      margin: 25px auto 40px auto;
      padding: 0 4vw 40px 4vw;
    }
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 9px;
      position: relative;
    }
    .back-arrow {
      background: none;
      border: none;
      color: #193c10;
      cursor: pointer;
      margin-left: -2px;
      width: 25px;
      height: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .action-btn-group { display: flex; gap: 16px; }
    .action-btn {
      background: #A6DEAA;
      border: none;
      border-radius: 30px;
      padding: 15px 28px;
      font-size: 1.12em;
      font-weight: 400;
      color: #193c10;
      cursor: pointer;
      transition: background 0.14s, color 0.13s;
      box-shadow: 0 2px 12px 0 rgba(109,164,109,0.10);
    }
    .action-btn:active, .action-btn.selected { background: #7bb37b; color: #fff; }
    .categories-header {
      background: #A6DEAA;
      border-radius: 34px;
      text-align: center;
      font-size: 2.2em;
      font-weight: 500;
      color: #222e12;
      margin: 38px auto 25px auto;
      padding: 18px 0 17px 0;
      letter-spacing: 1px;
      width: 98%;
    }
    .categories-grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 22px 16px;
      justify-items: center;
      padding-bottom: 15px;
    }
    .category-card {
      background: #A6DEAA;
      border-radius: 26px;
      width: 117px;
      height: 186px;
      padding: 15px 6px 10px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(109,164,109,0.09);
      position: relative;
      border: 3px solid transparent;
      transition: box-shadow 0.1s, border-color 0.13s, background 0.11s;
      margin: 0;
    }
    .category-card:hover, .category-card:focus {
      background: #8BC48A;
      box-shadow: 0 8px 18px rgba(32,71,36,0.12);
    }
    .category-card.delete-select { border: 3px solid #e46b66; background: #e9bdbb; }
    .category-img {
      width: 84px;
      height: 62px;
      background: #d3f6d1;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 15px;
      overflow: hidden;
    }
    .category-img-icon { font-size: 2em; color: #aadd9e; margin-top: 6px; margin-left: 2px; user-select: none; }
    .category-label {
      background: #244a22;
      color: #fff;
      border-radius: 13px;
      font-size: 1em;
      width: 94%;
      padding: 10px 2px;
      margin-top: 17px;
      text-align: center;
      font-weight: 400;
      user-select: none;
      letter-spacing: 0.5px;
    }
    .delete-btn-bar {
      margin: 19px auto -6px auto;
      text-align: center;
      color: #e46b66;
      font-weight: 600;
      font-size: 1.04em;
      display: none;
    }
    .delete-mode .delete-btn-bar { display: block; }
    .status-msg {
      text-align: center;
      margin-top: 12px;
      font-size: 1rem;
      color: #204d1e;
      min-height: 1em;
      font-weight: 500;
    }
    @media (max-width:700px) {
      .container { max-width: 99vw; padding: 0 2vw; }
      .categories-header { font-size: 1.45em; padding: 10px 0; }
      .categories-grid { gap: 13px 2vw; }
      .category-card { width: 41vw; max-width:118px; height: 120px; min-width: 90px; }
      .category-img { width: 67px; height: 53px; }
      .category-label { font-size: .97em; border-radius: 8px; padding: 6px 2px; }
    }
  </style>
</head>
<body>
  <div class="bg-overlay"></div>
  <div class="container">
    <div class="top-bar">
      <button class="back-arrow" title="Go Back" onclick="window.location.href='AdminPlants.html'" aria-label="Go Back">
        <svg height="22" width="28" viewBox="0 0 30 30" aria-hidden="true">
          <polyline points="20,6 10,15 20,24" fill="none" stroke="#193c10" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="action-btn-group">
        <button class="action-btn" id="addBtn" onclick="addCategory()">Add</button>
        <button class="action-btn" id="deleteBtn" onclick="toggleDeleteMode()">Delete</button>
      </div>
    </div>

    <div class="categories-header">Plant Categories</div>
    <div class="delete-btn-bar" id="deleteInfo">Tap categories to select. When ready, click Delete again.</div>
    <div class="status-msg" id="statusMsg"></div>
    <div class="categories-grid" id="categoriesGrid"></div>
  </div>

  <script>
    const API_BASE = "http://localhost:5000";
    let categories = [];
    let deleteMode = false;
    let deleteSelected = [];
    const msgEl = document.getElementById("statusMsg");

    function showMessage(msg, type="info") {
      msgEl.textContent = msg;
      msgEl.style.color = type === "error" ? "#b22222" : type === "success" ? "#2e7d32" : "#204d1e";
      setTimeout(() => msgEl.textContent = "", 2000);
    }

    async function loadCategories() {
      try {
        const res = await fetch(`${API_BASE}/api/categories`);
        if (!res.ok) throw new Error("Failed to load categories");
        categories = await res.json();
        renderCategories();
      } catch (err) {
        console.error(err);
        showMessage("Error loading categories", "error");
      }
    }

    function goBack() { window.history.back(); }

    async function addCategory() {
      const name = prompt("Enter new category name:");
      if (!name || !name.trim()) return;
      try {
        const res = await fetch(`${API_BASE}/api/categories/add`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: name.trim() }),
        });
        if (res.ok) {
          showMessage("Category added!", "success");
          await loadCategories();
        } else showMessage("Failed to add category", "error");
      } catch (err) {
        console.error(err);
        showMessage("Error adding category", "error");
      }
    }

    async function toggleDeleteMode() {
      const btn = document.getElementById("deleteBtn");
      if (!deleteMode) {
        deleteMode = true;
        deleteSelected = [];
        btn.classList.add("selected");
        document.body.classList.add("delete-mode");
        showMessage("Select categories to delete");
      } else {
        if (deleteSelected.length > 0) {
          try {
            const res = await fetch(`${API_BASE}/api/categories/delete`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ names: deleteSelected }),
            });
            if (res.ok) {
              showMessage("Deleted successfully!", "success");
              await loadCategories();
            } else showMessage("Failed to delete", "error");
          } catch (err) {
            console.error(err);
            showMessage("Error deleting", "error");
          }
        }
        deleteMode = false;
        deleteSelected = [];
        btn.classList.remove("selected");
        document.body.classList.remove("delete-mode");
      }
      renderCategories();
    }

    function toggleCategoryDeleteSelect(name) {
      if (deleteSelected.includes(name)) {
        deleteSelected = deleteSelected.filter(x => x !== name);
      } else {
        deleteSelected.push(name);
      }
      renderCategories();
    }

    function openCategory(name) {
      if (deleteMode) return toggleCategoryDeleteSelect(name);
      window.location.href = `AdminEachPlantCategory.html?category=${encodeURIComponent(name)}`;
    }

    function renderCategories() {
      const grid = document.getElementById("categoriesGrid");
      grid.innerHTML = categories.map(cat => `
        <div class="category-card${deleteMode && deleteSelected.includes(cat.name) ? " delete-select" : ""}"
          tabindex="0"
          onclick="openCategory('${cat.name}')"
          aria-label="${cat.name}"
          title="${cat.name}">
          <div class="category-img">
            ${
              cat.img
                ? `<img src="${cat.img}" alt="${cat.name}" style="width:98%;height:98%;object-fit:cover;border-radius:12px;">`
                : `<span class="category-img-icon">&#127793;</span>`
            }
          </div>
          <div class="category-label">${cat.name}</div>
        </div>
      `).join("");
      document.getElementById("deleteInfo").style.display = deleteMode ? "block" : "none";
    }

    loadCategories();
  </script>
</body>
</html>
