<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User - Plants</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&family=Kalam:wght@700&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      font-family: 'Baloo 2','Kalam','Arial',sans-serif;
      overflow-x: hidden;
      box-sizing: border-box;
    }

    body { position: relative; z-index: 0; }

    /* ✅ Background identical to AdminPlants */
    .background-overlay {
      position: fixed;
      z-index: 0;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      background: url('Bg.png') no-repeat center center fixed;
      background-size: cover;
    }

    .background-overlay::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      background: #fff;
      opacity: 0.7;
      z-index: 1;
    }

    /* ✅ Back arrow */
    .back-arrow {
      position: absolute;
      top: 1.8rem;
      left: 2rem;
      z-index: 3;
      background: none;
      border: none;
      cursor: pointer;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .back-arrow svg polyline {
      stroke: black;
      stroke-width: 4;
    }

    /* ✅ Button row */
    .button-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      margin-top: 6rem;
      position: relative;
      z-index: 2;
    }

    .menu-btn {
      background: #BFE7BC;
      border: none;
      border-radius: 20px;
      font-size: 1.05rem;
      color: #262A23;
      font-weight: bold;
      font-family: 'Baloo 2','Kalam',cursive,sans-serif;
      padding: 0.7rem 1.3rem;
      cursor: pointer;
      transition: background 0.2s ease;
      white-space: nowrap;
      box-shadow: 0 6px 18px #bfbfbf41;
    }

    .menu-btn:hover {
      background: #b3e572;
      color: #262A23;
    }

    /* ✅ Search bar */
    .search-bar {
      display: flex;
      align-items: center;
      background: #fff;
      border-radius: 30px;
      box-shadow: 0 6px 18px #bfbfbf41;
      padding: 0 1rem;
      width: 90%;
      max-width: 650px;
      height: 45px;
      margin: 2rem auto;
      z-index: 2;
      position: relative;
    }

    .search-bar input {
      width: 90%;
      border: none;
      outline: none;
      font-size: 1rem;
      background: transparent;
      margin-left: 10px;
      color: #222;
      font-family: inherit;
    }

    .search-bar input::placeholder {
      color: #376325b0;
      font-size: 1rem;
    }

    .search-bar svg {
      width: 1.8rem;
      height: 1.8rem;
      color: #4A771C;
    }

    /* ✅ Plant grid identical to AdminPlants */
    .plant-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      justify-content: center;
      align-items: start;
      gap: 1rem;
      width: 90%;
      max-width: 650px;
      margin: 0 auto 3rem auto;
      position: relative;
      z-index: 2;
    }

    .plant-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #BFE7BC;
      border-radius: 20px;
      padding: 0.7rem;
      height: 130px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease;
    }

    .plant-card:hover { transform: scale(1.03); }

    .plant-img {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      border: 2px solid #4A771C;
      background: #fff;
      object-fit: cover;
    }

    .plant-name {
      font-size: 1rem;
      font-family: 'Baloo 2','Kalam',cursive,sans-serif;
      color: #1A2B10;
      margin-top: 0.5rem;
      text-align: center;
    }

    /* ✅ Ask AI section */
    .ask-ai {
      width: 90%;
      max-width: 650px;
      margin: 1.5rem auto 2.5rem auto;
      background: #BFE7BC;
      border-radius: 20px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
    }

    .ask-ai textarea {
      width: 100%;
      border-radius: 16px;
      border: none;
      resize: none;
      font-size: 1rem;
      padding: 0.8rem;
      font-family: 'Baloo 2';
      outline: none;
      margin-bottom: 1rem;
      color: #262A23;
      background: #fff;
    }

    .ask-ai button {
      background: #BFE7BC;
      border: none;
      border-radius: 20px;
      font-size: 1rem;
      color: #262A23;
      font-family: 'Baloo 2','Kalam',cursive,sans-serif;
      padding: 0.6rem 1.8rem;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .ask-ai button:hover {
      background: #b3e572;
      color: #262A23;
    }

    @media (max-width:600px) {
      .plant-grid { grid-template-columns: 1fr 1fr; gap: 0.7rem; }
      .plant-card { height: 110px; border-radius: 16px; }
      .plant-img { width: 42px; height: 42px; }
      .plant-name { font-size: 0.9rem; }
      .menu-btn { font-size: 0.95rem; padding: 0.5rem 1rem; }
      .back-arrow { width: 28px; height: 28px; top: 1rem; left: 1rem; }
    }
  </style>
</head>

<body>
  <div class="background-overlay"></div>

  <button class="back-arrow" onclick="window.location.href='User.html'" aria-label="Go back">
    <svg viewBox="0 0 30 30" width="100%" height="100%">
      <polyline points="20,6 10,15 20,24"
                fill="none"
                stroke="black"
                stroke-width="4"
                stroke-linecap="round"
                stroke-linejoin="round"/>
    </svg>
  </button>

  <!-- Top buttons -->
  <div class="button-row">
    <button class="menu-btn" onclick="window.location.href='UserPlantCategories.html'">Categories</button>
    <button class="menu-btn" onclick="window.location.href='UserFishes.html'">Fishes</button>
  </div>

  <!-- Search -->
  <div class="search-bar">
    <svg viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="7" stroke="#4A771C" stroke-width="2" fill="none"/>
      <line x1="18" y1="18" x2="15.6" y2="15.6" stroke="#4A771C" stroke-width="2" />
    </svg>
    <input id="searchInput" type="text" placeholder="Search plants...">
  </div>

  <!-- Plant cards -->
  <div class="plant-grid" id="plantGrid">
    <!-- Static samples for layout testing -->
    <div class="plant-card" data-id="sample1" data-name="Mango Tree">
      <img src="mango.jpg" class="plant-img" alt="Mango Tree">
      <div class="plant-name">Mango Tree</div>
    </div>
    <div class="plant-card" data-id="sample2" data-name="Tulsi">
      <img src="tulsi.jpg" class="plant-img" alt="Tulsi">
      <div class="plant-name">Tulsi</div>
    </div>
  </div>

  <!-- Ask AI section -->
  <div class="ai-section">
  <label>Ask AI</label>
  <textarea id="aiQuestion" placeholder="Ask something..."></textarea>
  <button class ="btn" onclick="handleUniversalAI()">Chat with AI</button>
  <div id="aiResponse" style="display:flex; flex-direction:column; background:#f5f5f5; padding:1rem; border-radius:10px; max-height:200px; overflow-y:auto;"></div>
</div>

  <script>
    const API_BASE = "http://localhost:5000";

    async function loadPlants() {
      try {
        const res = await fetch(`${API_BASE}/api/plants`);
        if (!res.ok) throw new Error("Failed to load plants");
        const plants = await res.json();
        renderPlants(plants);
      } catch (err) {
        console.error("Error fetching plants:", err);
      }
    }

    function renderPlants(plants) {
      const grid = document.getElementById("plantGrid");
      grid.innerHTML = "";

      // Keep sample cards for layout test
      const samples = [
        { id: "sample1", name: "Mango Tree", image: "mango.jpg" },
        { id: "sample2", name: "Tulsi", image: "tulsi.jpg" }
      ];

      [...samples, ...plants].forEach(p => {
        const card = document.createElement("div");
        card.className = "plant-card";
        card.dataset.id = p.id || p.name;
        card.dataset.name = p.name;
        card.onclick = () => window.location.href = `UserEachPlant.html?id=${p.id || p.name}`;
        card.innerHTML = `
          <img src="${p.image || 'placeholder.jpg'}" class="plant-img" alt="${p.name}">
          <div class="plant-name">${p.name}</div>
        `;
        grid.appendChild(card);
      });
    }

    // Search functionality
    const searchInput = document.getElementById("searchInput");
    searchInput.addEventListener("input", () => {
      const query = searchInput.value.toLowerCase();
      document.querySelectorAll(".plant-card").forEach(card => {
        const name = card.dataset.name.toLowerCase();
        card.style.display = name.includes(query) ? "flex" : "none";
      });
    });

    function askAI() {
      const q = document.getElementById('aiQuestion').value.trim();
      const box = document.getElementById('aiResponse');
      if (!q) return;
      const user = document.createElement('div');
      user.textContent = 'You: ' + q;
      const ai = document.createElement('div');
      ai.textContent = 'AI: (placeholder) I’ll give info about ' + q + ' soon!';
      ai.style.marginTop = '0.3rem';
      box.appendChild(user);
      box.appendChild(ai);
      box.scrollTop = box.scrollHeight;
      document.getElementById('aiQuestion').value = '';
    }

    loadPlants();
  </script>
    <script src="/js/chat.js"></script>

</body>
</html>
