<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&family=Kalam:wght@700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Baloo 2','Kalam',sans-serif;
    }

    body {
      background: url('Bg.png') no-repeat center center fixed;
      background-size: cover;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.7);
      z-index: 0;
    }

    .logout-btn {
      position: absolute;
      top: 20px; right: 20px;
      background: #BFE7BC;
      border: none;
      border-radius: 12px;
      padding: 10px 20px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.95rem;
      color: #1A2B10;
      z-index: 2;
      transition: all 0.2s ease;
    }
    .logout-btn:hover {
      background: #A5D39B;
      transform: translateY(-2px);
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    h1 {
      color: #2e5015;
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 2.5rem;
      letter-spacing: 0.5px;
    }

    .button {
      background: #BFE7BC;
      color: #1A2B10;
      border: none;
      border-radius: 20px;
      padding: 14px 40px;
      margin: 10px 0;
      font-size: 1.15rem;
      font-weight: 600;
      cursor: pointer;
      width: 230px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .button:hover {
      background: #b3e572;
      transform: translateY(-3px);
    }

    .download-status {
      margin-top: 10px;
      color: #2e7d32;
      font-weight: 500;
      font-size: 1rem;
      display: none;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; margin-bottom: 2rem; }
      .button { font-size: 1rem; width: 200px; padding: 12px 25px; }
      .logout-btn { top: 12px; right: 12px; padding: 8px 14px; font-size: 0.9rem; }
    }
  </style>
</head>

<body>

  <!-- 🔐 ADMIN ACCESS CHECK (runs before anything renders) -->
  <script>
    const username = localStorage.getItem("username");
    const role = localStorage.getItem("role");

    if (!username || role !== "admin") {
      window.location.href = "Login.html";
    }
  </script>

  <div class="overlay"></div>
  <button class="logout-btn" onclick="logout()">Logout</button>

  <div class="container">
    <h1>Admin Dashboard</h1>

    <button class="button" onclick="navigateTo('AdminPlants.html')">🌿 Plants</button>
    <button class="button" onclick="navigateTo('AdminFishes.html')">🐠 Fishes</button>
    <button class="button" id="downloadBtn" onclick="downloadData()">⬇️ Download Data</button>

    <div class="download-status" id="downloadStatus">Preparing download...</div>
  </div>

  <script>
    const API_BASE = "https://mygardenbook-backend.onrender.com";

    function navigateTo(page) {
      window.location.href = page;
    }

    // 📦 Download Excel export
    async function downloadData() {
      const status = document.getElementById("downloadStatus");
      status.style.display = "block";
      status.textContent = "Preparing download...";

      try {
        const res = await fetch(`${API_BASE}/api/export`);
        if (!res.ok) throw new Error("Export failed");

        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);

        const link = document.createElement("a");
        link.href = url;
        link.download = "MyGardenBook_Data.xlsx";
        document.body.appendChild(link);
        link.click();
        link.remove();
        window.URL.revokeObjectURL(url);

        status.textContent = "✅ Download complete!";
        setTimeout(() => (status.style.display = "none"), 2000);

      } catch (err) {
        console.error(err);
        status.textContent = "❌ Failed to download data.";
        setTimeout(() => (status.style.display = "none"), 3000);
      }
    }

    function logout() {
      localStorage.clear();
      window.location.href = "Login.html";
    }
  </script>

</body>
</html>
